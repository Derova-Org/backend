name: Deploy - Backend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Build & Deploy to ECS Fargate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-1
      ECR_REPOSITORY: derova-backend
      ECS_CLUSTER: derova
      ECS_SERVICE: derova-backend

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout SDK (file:../sdk dependency)
        uses: actions/checkout@v4
        with:
          repository: Derova-Org/sdk
          token: ${{ secrets.GH_READ_SDK_TOKEN }}
          path: sdk

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build SDK
        working-directory: sdk
        run: npm ci && npm run build

      - name: Patch package.json and Dockerfile for local SDK path
        run: |
          sed -i 's|"@derova/sdk": "file:../sdk"|"@derova/sdk": "file:./sdk"|g' package.json
          npm install --package-lock-only --ignore-scripts 2>/dev/null || true
          sed -i 's|COPY package.json package-lock.json\* \./|COPY sdk ./sdk\nCOPY package.json package-lock.json* ./|' Dockerfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Ensure ECS cluster exists
        run: |
          CLUSTER_STATUS=$(aws ecs describe-clusters --clusters $ECS_CLUSTER \
            --query 'clusters[?status==`ACTIVE`].status' --output text 2>/dev/null || echo "")
          if [ -z "$CLUSTER_STATUS" ]; then
            echo "Creating ECS cluster '$ECS_CLUSTER'..."
            aws ecs create-cluster --cluster-name $ECS_CLUSTER \
              --capacity-providers FARGATE FARGATE_SPOT \
              --tags key=project,value=derova
          else
            echo "Cluster exists (status: $CLUSTER_STATUS)"
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY 2>/dev/null || \
            aws ecr create-repository --repository-name $ECR_REPOSITORY \
              --image-scanning-configuration scanOnPush=true

      - name: Ensure CloudWatch log group exists
        run: |
          aws logs create-log-group --log-group-name /ecs/derova-backend 2>/dev/null || echo "Log group already exists"
          aws logs put-retention-policy --log-group-name /ecs/derova-backend --retention-in-days 30

      - name: Pre-flight checks
        run: |
          echo "=== Checking IAM roles ==="
          aws iam get-role --role-name derova-backend-execution-role --query 'Role.Arn' --output text 2>&1 || echo "WARN: execution role not found"
          aws iam get-role --role-name derova-backend-task-role --query 'Role.Arn' --output text 2>&1 || echo "WARN: task role not found"

          echo "=== Checking Secrets Manager ==="
          aws secretsmanager describe-secret --secret-id derova/backend/DATABASE_URL --query 'Name' --output text 2>&1 || echo "WARN: DATABASE_URL secret not found"
          aws secretsmanager describe-secret --secret-id derova/backend/JWT_SECRET --query 'Name' --output text 2>&1 || echo "WARN: JWT_SECRET secret not found"
          aws secretsmanager describe-secret --secret-id derova/backend/HMAC_KEY --query 'Name' --output text 2>&1 || echo "WARN: HMAC_KEY secret not found"

          echo "=== Checking CloudWatch Log Group ==="
          aws logs describe-log-groups --log-group-name-prefix /ecs/derova-backend --query 'logGroups[0].logGroupName' --output text 2>&1 || echo "WARN: log group not found"

          echo "=== Checking Target Group ==="
          aws elbv2 describe-target-groups \
            --target-group-arns arn:aws:elasticloadbalancing:us-east-1:273369152732:targetgroup/derova-backend/ff32c59141d8b118 \
            --query 'TargetGroups[0].TargetGroupName' --output text 2>&1 || echo "WARN: target group not found"

          echo "=== Checking subnets ==="
          aws ec2 describe-subnets --subnet-ids subnet-0b96ac6e2a27ad803 subnet-046e3bff40428650a \
            --query 'Subnets[].{id:SubnetId,az:AvailabilityZone,state:State}' --output table 2>&1 || echo "WARN: subnets not found"

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Render task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/task-definition.json
          container-name: backend
          image: ${{ steps.build-image.outputs.image }}

      - name: Register task definition and deploy ECS service
        env:
          RENDERED_TASK_DEF: ${{ steps.task-def.outputs.task-definition }}
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://$RENDERED_TASK_DEF \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: $TASK_DEF_ARN"

          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER --services $ECS_SERVICE \
            --query 'services[?status!=`INACTIVE`].status' --output text 2>/dev/null || echo "")

          if [ -z "$SERVICE_STATUS" ]; then
            echo "Creating ECS service..."
            aws ecs create-service \
              --cluster $ECS_CLUSTER --service-name $ECS_SERVICE \
              --task-definition "$TASK_DEF_ARN" --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[subnet-0b96ac6e2a27ad803,subnet-046e3bff40428650a],securityGroups=[sg-096e44580f804bb90],assignPublicIp=DISABLED}" \
              --load-balancers "targetGroupArn=arn:aws:elasticloadbalancing:us-east-1:273369152732:targetgroup/derova-backend/ff32c59141d8b118,containerName=backend,containerPort=3000" \
              --health-check-grace-period-seconds 120 \
              --deployment-configuration "deploymentCircuitBreaker={enable=true,rollback=true},minimumHealthyPercent=0,maximumPercent=200"
          else
            echo "Updating service ($SERVICE_STATUS)..."
            aws ecs update-service \
              --cluster $ECS_CLUSTER --service $ECS_SERVICE \
              --task-definition "$TASK_DEF_ARN" --force-new-deployment
          fi

          echo "Waiting for service to stabilize (up to 10 min)..."
          if ! aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE; then
            echo "=== SERVICE FAILED TO STABILIZE — DIAGNOSTICS ==="
            echo "--- Service events ---"
            aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE \
              --query 'services[0].events[:10]' --output table 2>&1 || true
            echo "--- Stopped tasks ---"
            STOPPED=$(aws ecs list-tasks --cluster $ECS_CLUSTER --service-name $ECS_SERVICE \
              --desired-status STOPPED --query 'taskArns[:3]' --output text 2>/dev/null || echo "")
            if [ -n "$STOPPED" ]; then
              aws ecs describe-tasks --cluster $ECS_CLUSTER --tasks $STOPPED \
                --query 'tasks[].{status:lastStatus,reason:stoppedReason,container:containers[0].{name:name,exitCode:exitCode,reason:reason}}' \
                --output yaml 2>&1 || true
            fi
            echo "--- Running tasks ---"
            RUNNING=$(aws ecs list-tasks --cluster $ECS_CLUSTER --service-name $ECS_SERVICE \
              --desired-status RUNNING --query 'taskArns[:3]' --output text 2>/dev/null || echo "")
            if [ -n "$RUNNING" ]; then
              aws ecs describe-tasks --cluster $ECS_CLUSTER --tasks $RUNNING \
                --query 'tasks[].{status:lastStatus,health:healthStatus}' --output yaml 2>&1 || true
            fi
            exit 1
          fi
          echo "Service stable."

      - name: Verify health endpoint
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --query 'LoadBalancers[?contains(LoadBalancerName,`derova`)].DNSName' \
            --output text 2>/dev/null || echo "")
          if [ -n "$ALB_DNS" ]; then
            echo "ALB DNS: $ALB_DNS"
            curl -sf "http://$ALB_DNS/health" && echo " => /health OK" || echo " => /health not yet reachable"
          fi

      - name: Summary
        if: always()
        env:
          IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          echo "### Backend deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${IMAGE:-N/A}" >> $GITHUB_STEP_SUMMARY
          echo "- Cluster: $ECS_CLUSTER / Service: $ECS_SERVICE" >> $GITHUB_STEP_SUMMARY
